<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#fff0f5);
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    width:90%;
    max-width:350px;
}

.teddy{
    font-size:80px;
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    50%{
        transform:translateY(-10px);
    }
}

h1{
    color:#ff4d88;
    font-size:1.8rem;
    margin:20px 0;
}

button{
    border:none;
    border-radius:50px;
    padding:15px 28px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}

#yesBtn{
    background:#ff4d88;
    color:white;
}

#noBtn{
    background:white;
    color:#444;
    position:relative;
}

#final{
    display:none;
}

.heart{
    position:absolute;
    font-size:20px;
    animation:float 5s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

@media(max-width:480px){

    .teddy{
        font-size:70px;
    }

    h1{
        font-size:1.5rem;
    }

    button{
        width:120px;
        padding:14px;
        font-size:17px;
    }
}
</style>
</head>

<body>

<div class="container" id="main">

<div class="teddy">🧸</div>

<h1 id="question">
Will you go on a date with me? ❤️
</h1>

<button id="yesBtn">Yes ❤️</button>
<button id="noBtn">No 😢</button>

</div>

<div class="container" id="final">

<div class="teddy">🧸💕</div>

<h1>Yayyyyy!! ❤️🥰</h1>
<h1>Can't wait to make memories with you 🌹</h1>

</div>

<script>

let count=0;

const messages=[
"Are you sure? 🥺",
"Really sure? 😭",
"Think again ❤️",
"Last chance 😢",
"Please? 🥹"
];

const q=document.getElementById("question");
const yes=document.getElementById("yesBtn");
const no=document.getElementById("noBtn");

no.addEventListener("click",()=>{

count++;

if(count<=5){
    q.innerHTML=messages[count-1];
    yes.style.transform=`scale(${1+count*0.15})`;
}

if(count>=5){
    moveButton();
}

});

no.addEventListener("touchstart",()=>{

if(count>=5){
moveButton();
}

});

function moveButton(){

let x=Math.random()*(window.innerWidth-100);
let y=Math.random()*(window.innerHeight-100);

no.style.position="absolute";
no.style.left=x+"px";
no.style.top=y+"px";

}

yes.addEventListener("click",()=>{

document.getElementById("main").style.display="none";
document.getElementById("final").style.display="block";

setInterval(createHeart,300);

});

function createHeart(){

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(createHeart,700);

</script>

</body>
</html>
